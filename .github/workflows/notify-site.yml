name: Notify site

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SITE_APP_ID }}
          private-key: ${{ secrets.SITE_APP_PRIVATE_KEY }}
          repositories: weld-and-arrow-site
      - name: Dispatch site rebuild
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SITE_REPO: ${{ github.repository_owner }}/weld-and-arrow-site
          SOURCE_SHA: ${{ github.sha }}
        run: |
          gh api "repos/${SITE_REPO}/dispatches" \
            --method POST \
            --field event_type=source-push \
            --raw-field client_payload="{\"sha\":\"${SOURCE_SHA}\"}"

      - name: Skip dispatch without token
        if: ${{ secrets.SITE_APP_PRIVATE_KEY == '' }}
        run: echo "::warning::SITE_APP_PRIVATE_KEY is not configured; site redeploy dispatch was skipped."
