name: Notify site

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      SITE_DISPATCH_TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
    steps:
      - name: Dispatch site rebuild
        if: ${{ env.SITE_DISPATCH_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.SITE_DISPATCH_TOKEN }}
          SITE_REPO: ${{ github.repository_owner }}/website
          SOURCE_SHA: ${{ github.sha }}
        run: |
          gh api "repos/${SITE_REPO}/dispatches" \
            --method POST \
            --field event_type=source-push \
            --raw-field client_payload="{\"sha\":\"${SOURCE_SHA}\"}"

      - name: Skip dispatch without token
        if: ${{ env.SITE_DISPATCH_TOKEN == '' }}
        run: echo "::warning::SITE_DISPATCH_TOKEN is not configured; site redeploy dispatch was skipped."
